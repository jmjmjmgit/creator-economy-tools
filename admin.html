<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CET Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --surface: #121215;
            --border: #27272a;
            --text: #fafafa;
            --text-muted: #a1a1aa;
            --purple: #a855f7;
            --pink: #ec4899;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--purple), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn:hover {
            border-color: var(--purple);
            background: rgba(168, 85, 247, 0.1);
        }

        .btn-primary {
            background: var(--purple);
            border-color: var(--purple);
        }

        .btn-primary:hover {
            background: #9333ea;
            border-color: #9333ea;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 16px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .controls {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .search-input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--purple);
        }

        .table-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255, 255, 255, 0.02);
            padding: 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .tool-name-cell {
            font-weight: 600;
            color: var(--text);
        }

        .cat-badge {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(168, 85, 247, 0.1);
            color: var(--purple);
            border-radius: 4px;
            font-size: 11px;
            margin-right: 4px;
            margin-bottom: 4px;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-live {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
        }

        .status-dead {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.1);
        }

        .edit-btn:hover {
            color: var(--purple);
        }

        .delete-btn:hover {
            color: var(--error);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            padding: 32px;
            position: relative;
        }

        .modal-header {
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .form-input,
        .form-textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 8px;
            font-family: inherit;
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--purple);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 32px;
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 2000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div>
                <h1>Admin Dashboard</h1>
                <p style="color: var(--text-muted); margin: 4px 0 0 0;">Manage Creator Economy Tools ecosystem</p>
            </div>
            <div class="actions">
                <button class="btn" id="generateBtn">
                    ⚡ Regenerate Pages
                </button>
                <button class="btn btn-primary" id="addToolBtn">
                    + Add New Tool
                </button>
            </div>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">Total Tools</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statLive">0</div>
                <div class="stat-label">Live Tools</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statDead">0</div>
                <div class="stat-label">Graveyard</div>
            </div>
        </div>

        <div class="controls">
            <input type="text" class="search-input" id="searchInput"
                placeholder="Search by name, category or description...">
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 200px;">Tool</th>
                        <th>Description</th>
                        <th style="width: 250px;">Categories</th>
                        <th style="width: 100px;">Status</th>
                        <th style="width: 100px;">Actions</th>
                    </tr>
                </thead>
                <tbody id="toolsTableBody">
                    <!-- Rows injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Add New Tool</h2>
            </div>
            <form id="toolForm">
                <input type="hidden" id="toolId">
                <div class="form-group">
                    <label class="form-label">Tool Name</label>
                    <input type="text" id="toolName" class="form-input" required placeholder="e.g. Scripe">
                </div>
                <div class="form-group">
                    <label class="form-label">URL</label>
                    <input type="url" id="toolUrl" class="form-input" required placeholder="https://...">
                </div>
                <div class="form-group">
                    <label class="form-label">Logo URL (Optional)</label>
                    <input type="url" id="toolImg" class="form-input" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea id="toolDesc" class="form-textarea" rows="3" required
                        placeholder="Describe what it does..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Categories (comma separated)</label>
                    <input type="text" id="toolCategories" class="form-input" required
                        placeholder="AI, Content Creation">
                </div>
                <div class="form-group">
                    <label class="form-label">Pricing (e.g. Free, Paid, Freemium)</label>
                    <input type="text" id="toolPricing" class="form-input" placeholder="Free">
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="toolDead">
                    <label for="toolDead">Is Dead? (Graveyard)</label>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" id="modalCancel">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Tool</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        let allTools = [];
        let filteredTools = [];
        let editIndex = -1;

        async function fetchTools() {
            try {
                const res = await fetch('/api/tools');
                allTools = await res.json();
                filteredTools = [...allTools];
                updateStats();
                renderTable();
            } catch (err) {
                showToast('Failed to fetch tools', true);
            }
        }

        function updateStats() {
            document.getElementById('statTotal').textContent = allTools.length;
            document.getElementById('statLive').textContent = allTools.filter(t => !t.dead).length;
            document.getElementById('statDead').textContent = allTools.filter(t => t.dead).length;
        }

        function renderTable() {
            const body = document.getElementById('toolsTableBody');
            body.innerHTML = filteredTools.map((t, i) => `
                <tr>
                    <td class="tool-name-cell">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <img src="${t.img || 'https://www.google.com/s2/favicons?sz=64&domain=' + t.url}" style="width:24px; height:24px; border-radius:4px;">
                            ${escapeHtml(t.name)}
                        </div>
                    </td>
                    <td><div style="max-height: 3.6em; overflow: hidden; color: var(--text-muted);">${escapeHtml(t.desc)}</div></td>
                    <td>${(t.categories || []).map(c => `<span class="cat-badge">${escapeHtml(c)}</span>`).join('')}</td>
                    <td><span class="status-badge ${t.dead ? 'status-dead' : 'status-live'}">${t.dead ? 'DEAD' : 'LIVE'}</span></td>
                    <td class="actions">
                        <button class="action-btn edit-btn" onclick="editTool('${t.name}')">✏️</button>
                        <button class="action-btn delete-btn" onclick="deleteTool('${t.name}')">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        function filterTools() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            filteredTools = allTools.filter(t =>
                t.name.toLowerCase().includes(q) ||
                t.desc.toLowerCase().includes(q) ||
                t.categories.some(c => c.toLowerCase().includes(q))
            );
            renderTable();
        }

        async function saveAll() {
            const res = await fetch('/api/tools', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(allTools)
            });
            if (res.ok) {
                showToast('Saved successfully');
                fetchTools();
            } else {
                showToast('Save failed', true);
            }
        }

        function editTool(name) {
            const index = allTools.findIndex(t => t.name === name);
            if (index === -1) return;

            const tool = allTools[index];
            editIndex = index;

            document.getElementById('modalTitle').textContent = 'Edit Tool';
            document.getElementById('toolName').value = tool.name;
            document.getElementById('toolUrl').value = tool.url;
            document.getElementById('toolImg').value = tool.img || '';
            document.getElementById('toolDesc').value = tool.desc;
            document.getElementById('toolCategories').value = tool.categories.join(', ');
            document.getElementById('toolPricing').value = tool.pricing || '';
            document.getElementById('toolDead').checked = !!tool.dead;

            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function deleteTool(name) {
            if (!confirm(`Are you sure you want to delete ${name}?`)) return;
            allTools = allTools.filter(t => t.name !== name);
            saveAll();
        }

        document.getElementById('addToolBtn').onclick = () => {
            editIndex = -1;
            document.getElementById('modalTitle').textContent = 'Add New Tool';
            document.getElementById('toolForm').reset();
            document.getElementById('modalOverlay').style.display = 'flex';
        };

        document.getElementById('modalCancel').onclick = () => {
            document.getElementById('modalOverlay').style.display = 'none';
        };

        document.getElementById('toolForm').onsubmit = (e) => {
            e.preventDefault();
            const tool = {
                name: document.getElementById('toolName').value,
                url: document.getElementById('toolUrl').value,
                img: document.getElementById('toolImg').value,
                desc: document.getElementById('toolDesc').value,
                categories: document.getElementById('toolCategories').value.split(',').map(s => s.trim()).filter(Boolean),
                pricing: document.getElementById('toolPricing').value,
                dead: document.getElementById('toolDead').checked
            };

            if (editIndex > -1) {
                allTools[editIndex] = tool;
            } else {
                allTools.unshift(tool);
            }

            document.getElementById('modalOverlay').style.display = 'none';
            saveAll();
        };

        document.getElementById('searchInput').oninput = filterTools;

        document.getElementById('generateBtn').onclick = async () => {
            const btn = document.getElementById('generateBtn');
            btn.classList.add('loading');
            btn.textContent = 'Generating...';

            try {
                const res = await fetch('/api/generate', { method: 'POST' });
                if (res.ok) {
                    showToast('Pages successfully regenerated!');
                } else {
                    showToast('Generation failed', true);
                }
            } catch (err) {
                showToast('Network error', true);
            } finally {
                btn.classList.remove('loading');
                btn.textContent = '⚡ Regenerate Pages';
            }
        };

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            t.style.borderColor = isError ? 'var(--error)' : 'var(--purple)';
            t.style.background = isError ? 'rgba(239, 68, 68, 0.1)' : 'var(--surface)';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        fetchTools();
    </script>
</body>

</html>
